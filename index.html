<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BringData Pico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --chart-height: 400px; }
        .file-scroll { max-height: 250px; overflow-y: auto; margin-bottom: var(--pico-spacing); }
        .file-item { cursor: pointer; padding: 0.5rem; border-bottom: 1px solid var(--pico-muted-border-color); font-family: monospace; font-size: 0.85rem; }
        .file-item:hover { background: var(--pico-secondary-hover-background); }
        #msgChart { height: var(--chart-height) !important; }
    </style>
</head>
<body>

<main class="container">
    <hgroup>
        <h1>BringData</h1>
        <p>Chat statistics visualizer (WhatsApp & Instagram)</p>
    </hgroup>

    <article id="upload-area">
        <label for="fileInput">
            <strong>Step 1: Upload ZIP or Chat File</strong>
            <input type="file" id="fileInput" accept=".zip,.json,.txt">
        </label>
        <small id="status">Waiting for data...</small>
    </article>

    <article id="pickerSection" class="hidden" style="display:none">
        <header>Select a file to process</header>
        <input type="search" id="searchInput" placeholder="Filter files...">
        <div class="file-scroll" id="fileList"></div>
        <footer>
            <small>Click a file to append its data to the plot.</small>
        </footer>
    </article>

    <article id="chartArea" style="display:none">
        <canvas id="msgChart"></canvas>
        <footer class="grid">
            <button class="secondary" id="downloadBtn">Download Plot (PNG)</button>
            <button class="outline contrast" id="resetBtn">Clear All</button>
        </footer>
    </article>
</main>

<script>
    let activeZipFiles = [];
    let masterData = [];
    let chart = null;

    // Logic from statsAvg2.py
    const nameMapper = (name) => name.includes("Matias") ? "Matias" : "Girl";

    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const searchInput = document.getElementById('searchInput');
    const status = document.getElementById('status');
    const pickerSection = document.getElementById('pickerSection');
    const chartArea = document.getElementById('chartArea');

    fileInput.onchange = (e) => handleUpload(e.target.files[0]);
    searchInput.oninput = (e) => filterFiles(e.target.value);

    async function handleUpload(file) {
        if (!file) return;
        if (file.name.endsWith('.zip')) {
            status.innerText = "Reading ZIP archive...";
            const zip = await JSZip.loadAsync(file);
            activeZipFiles = Object.keys(zip.files).filter(path => {
                const low = path.toLowerCase();
                return !zip.files[path].dir && (low.endsWith('.json') || low.endsWith('.txt'));
            }).map(path => ({ path, obj: zip.files[path] }));
            
            renderList(activeZipFiles);
            pickerSection.style.display = 'block';
            status.innerText = "ZIP loaded. Use the search bar to find chat logs.";
        } else {
            const content = await file.text();
            processData(file.name, content);
        }
    }

    function renderList(files) {
        fileList.innerHTML = '';
        files.forEach(file => {
            const div = document.createElement('div');
            div.className = 'file-item';
            div.innerText = file.path;
            div.onclick = async () => {
                const content = await file.obj.async("string");
                processData(file.path, content);
                status.innerText = `Added data from: ${file.path.split('/').pop()}`;
            };
            fileList.appendChild(div);
        });
    }

    function filterFiles(term) {
        const filtered = activeZipFiles.filter(f => f.path.toLowerCase().includes(term.toLowerCase()));
        renderList(filtered);
    }

    function processData(filename, content) {
        let newMsgs = [];
        const lowerName = filename.toLowerCase();

        if (lowerName.endsWith(".json")) {
            try {
                const json = JSON.parse(content);
                (json.messages || []).forEach(m => {
                    const text = m.content || (m.share ? "ATTACHMENT" : "");
                    newMsgs.push({
                        date: new Date(m.timestamp_ms),
                        sender: nameMapper(m.sender_name),
                        wordCount: String(text).split(/\s+/).length
                    });
                });
            } catch(e) { console.error("JSON Error", e); }
        } else if (lowerName.endsWith(".txt")) {
            // WhatsApp Regex from statsAvg2.py
            const regex = /(\d{1,2}\/\d{1,2}\/\d{2}),\s(\d{2}:\d{2})\s-\s(.*?):\s([\s\S]*?)(?=\n\d{1,2}\/\d{1,2}\/\d{2},|$)/g;
            let match;
            while ((match = regex.exec(content)) !== null) {
                newMsgs.push({
                    date: new Date(`${match[1]} ${match[2]}`),
                    sender: nameMapper(match[3]),
                    wordCount: match[4].trim().split(/\s+/).length
                });
            }
        }

        masterData = [...masterData, ...newMsgs].sort((a, b) => a.date - b.date);
        chartArea.style.display = 'block';
        updatePlot();
    }

    function updatePlot() {
        const weeks = {};
        const senders = new Set();
        masterData.forEach(m => {
            const d = new Date(m.date);
            const day = d.getDay(), diff = d.getDate() - day + (day == 0 ? -6 : 1);
            const monday = new Date(d.setDate(diff)).toISOString().split('T')[0];
            
            senders.add(m.sender);
            if (!weeks[monday]) weeks[monday] = {};
            weeks[monday][m.sender] = (weeks[monday][m.sender] || 0) + m.wordCount;
        });

        const sortedWeeks = Object.keys(weeks).sort();
        const datasets = Array.from(senders).map(sender => ({
            label: sender,
            data: sortedWeeks.map(w => (weeks[w][sender] || 0) / 7),
            borderWidth: 2,
            tension: 0.2
        }));

        if (chart) chart.destroy();
        chart = new Chart(document.getElementById('msgChart'), {
            type: 'line',
            data: { labels: sortedWeeks, datasets: datasets },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'word_count_plot.png';
        link.href = document.getElementById('msgChart').toDataURL('image/png');
        link.click();
    };

    document.getElementById('resetBtn').onclick = () => location.reload();
</script>
</body>
</html>
