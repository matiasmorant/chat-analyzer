<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BringData Pico + date-fns</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/date-fns@3.6.0/cdn.min.js"></script>
    <style>
        :root { --chart-height: 450px; }
        .file-scroll { max-height: 250px; overflow-y: auto; margin-bottom: var(--pico-spacing); border: 1px solid var(--pico-muted-border-color); border-radius: 4px; }
        .file-item { cursor: pointer; padding: 0.5rem; border-bottom: 1px solid var(--pico-muted-border-color); font-family: monospace; font-size: 0.85rem; transition: background 0.2s; }
        .file-item:hover { background: var(--pico-secondary-hover-background); }
        .file-item:last-child { border-bottom: none; }
        #msgChart { height: var(--chart-height) !important; width: 100% !important; }
        .controls-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
        
        /* Log Label Toggle Styling */
        #logScaleCheck { display: none; }
        .log-toggle {
            display: inline-block;
            padding: 0.1rem 0.6rem;
            border-radius: 4px;
            border: 1px solid var(--pico-primary);
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            user-select: none;
            transition: all 0.2s ease;
            color: var(--pico-primary);
            background: transparent;
            margin-bottom: 0;
        }
        #logScaleCheck:checked + .log-toggle {
            background: var(--pico-primary);
            color: var(--pico-primary-inverse);
        }
    </style>
</head>
<body>

<main class="container">
    <hgroup>
        <h1>Chat Analyzer</h1>
        <p>WhatsApp & Instagram</p>
    </hgroup>

    <article id="upload-area">
        <label for="fileInput">
            <strong>Step 1: Upload ZIP, JSON, or TXT</strong>
            <input type="file" id="fileInput" accept=".zip,.json,.txt">
        </label>
        <small id="status">Ready to process exports.</small>
    </article>

    <article id="pickerSection" style="display:none">
        <header><strong>Step 2: File Picker (fzf-style)</strong></header>
        <input type="search" id="searchInput" placeholder="Search by name or extension...">
        <div class="file-scroll" id="fileList"></div>
    </article>

    <article id="chartArea" style="display:none">
        <div class="controls-row">
            <input type="checkbox" id="logScaleCheck">
            <label for="logScaleCheck" class="log-toggle">LOG</label>
        </div>
        <canvas id="msgChart"></canvas>
        <footer class="grid">
            <button class="secondary" id="downloadBtn">Download Plot</button>
            <button class="outline contrast" id="resetBtn">Reset Session</button>
        </footer>
    </article>
</main>

<script>
    let activeZipFiles = [];
    let masterData = [];
    let chart = null;

    const nameMapper = (name) => name.includes("Matias") ? "Matias" : "Girl";

    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const searchInput = document.getElementById('searchInput');
    const status = document.getElementById('status');
    const pickerSection = document.getElementById('pickerSection');
    const chartArea = document.getElementById('chartArea');
    const logScaleCheck = document.getElementById('logScaleCheck');

    fileInput.onchange = (e) => handleUpload(e.target.files[0]);
    searchInput.oninput = (e) => filterFiles(e.target.value);
    logScaleCheck.onchange = () => updatePlot();

    async function handleUpload(file) {
        if (!file) return;
        if (file.name.endsWith('.zip')) {
            status.innerText = "Indexing ZIP...";
            const zip = await JSZip.loadAsync(file);
            activeZipFiles = Object.keys(zip.files).filter(path => {
                const low = path.toLowerCase();
                return !zip.files[path].dir && (low.endsWith('.json') || low.endsWith('.txt'));
            }).map(path => ({ path, obj: zip.files[path] }));
            
            renderList(activeZipFiles);
            pickerSection.style.display = 'block';
            status.innerText = "Filter files using the search box.";
        } else {
            const content = await file.text();
            processData(file.name, content);
        }
    }

    function getLongestCommonPrefix(paths) {
        if (!paths.length) return "";
        let sorted = paths.concat().sort();
        let a1 = sorted[0], a2 = sorted[sorted.length - 1], L = a1.length, i = 0;
        while (i < L && a1.charAt(i) === a2.charAt(i)) i++;
        return a1.substring(0, i);
    }

    function renderList(files) {
        fileList.innerHTML = '';
        
        const paths = files.map(f => f.path);
        let commonPrefix = getLongestCommonPrefix(paths);
        
        // Ensure we only strip at directory boundaries
        const lastSlash = commonPrefix.lastIndexOf('/');
        if (lastSlash !== -1) {
            commonPrefix = commonPrefix.substring(0, lastSlash + 1);
        } else {
            commonPrefix = "";
        }

        files.forEach(file => {
            const div = document.createElement('div');
            div.className = 'file-item';
            
            const displayPath = file.path.startsWith(commonPrefix) 
                ? file.path.replace(commonPrefix, '') 
                : file.path;

            div.innerText = displayPath;
            div.onclick = async () => {
                const content = await file.obj.async("string");
                // Hide the picker section after selection
                pickerSection.style.display = 'none';
                processData(file.path, content);
                status.innerText = `Appended: ${file.path.split('/').pop()}`;
            };
            fileList.appendChild(div);
        });
    }

    function filterFiles(term) {
        const filtered = activeZipFiles.filter(f => f.path.toLowerCase().includes(term.toLowerCase()));
        renderList(filtered);
    }

    function processData(filename, content) {
        let newMsgs = [];
        const lowerName = filename.toLowerCase();

        if (lowerName.endsWith(".json")) {
            try {
                const json = JSON.parse(content);
                (json.messages || []).forEach(m => {
                    const text = m.content || (m.share ? "ATTACHMENT" : "");
                    newMsgs.push({
                        date: new Date(m.timestamp_ms),
                        sender: nameMapper(m.sender_name),
                        wordCount: String(text).split(/\s+/).length
                    });
                });
            } catch(e) { console.error("JSON Error", e); }
        } else if (lowerName.endsWith(".txt")) {
            const regex = /(\d{1,2}\/\d{1,2}\/\d{2}),\s(\d{2}:\d{2})\s-\s(.*?):\s([\s\S]*?)(?=\n\d{1,2}\/\d{1,2}\/\d{2},|$)/g;
            let match;
            while ((match = regex.exec(content)) !== null) {
                const dt = dateFns.parse(`${match[1]} ${match[2]}`, 'M/d/yy HH:mm', new Date());
                newMsgs.push({
                    date: dt,
                    sender: nameMapper(match[3]),
                    wordCount: match[4].trim().split(/\s+/).length
                });
            }
        }

        masterData = [...masterData, ...newMsgs].sort((a, b) => a.date - b.date);
        chartArea.style.display = 'block';
        updatePlot();
    }

function updatePlot() {
    if (masterData.length === 0) return;

    const isLog = logScaleCheck.checked;
    const weeks = {};
    const senders = new Set();
    
    const firstDate = masterData[0].date;
    const lastDate = masterData[masterData.length - 1].date;

    const paddedFirstDate = dateFns.subWeeks(dateFns.startOfDay(firstDate), 1);
    const totalDays = dateFns.differenceInDays(lastDate, paddedFirstDate);

    masterData.forEach(m => {
        const mondayDate = dateFns.startOfWeek(m.date, { weekStartsOn: 1 });
        const mondayStr = dateFns.format(mondayDate, 'yyyy-MM-dd');
        
        senders.add(m.sender);
        if (!weeks[mondayStr]) weeks[mondayStr] = { totals: {}, monday: mondayDate };
        weeks[mondayStr].totals[m.sender] = (weeks[mondayStr].totals[m.sender] || 0) + m.wordCount;
    });

    const sortedWeekKeys = Object.keys(weeks).sort();
    
    const datasets = Array.from(senders).map(sender => ({
        label: sender,
        data: sortedWeekKeys.map(wKey => {
            const week = weeks[wKey];
            const currentWeekStart = week.monday;
            const currentWeekEnd = dateFns.addDays(currentWeekStart, 7);

            const effStart = currentWeekStart < firstDate ? firstDate : currentWeekStart;
            const effEnd = currentWeekEnd > lastDate ? lastDate : currentWeekEnd;
            const diffInMs = effEnd - effStart;
            const deltaDays = diffInMs / (1000 * 60 * 60 * 24);
            const daysInWeek = Math.max(Math.min(deltaDays, 7.0), 1.0);

            const totalWords = week.totals[sender] || 0;
            const avg = totalWords / daysInWeek;
            
            return {
                x: dateFns.differenceInDays(currentWeekStart, paddedFirstDate),
                y: isLog && avg < 1 ? 1 : avg // Log scale requires values > 0
            };
        }),
        borderWidth: 2,
        tension: 0.3
    }));

    const monthBoundaries = [];
    let curr = dateFns.startOfMonth(paddedFirstDate);
    while (curr <= lastDate) {
        const startOffset = dateFns.differenceInDays(curr, paddedFirstDate);
        const nextMonth = dateFns.addMonths(curr, 1);
        const endOffset = dateFns.differenceInDays(nextMonth, paddedFirstDate);
        
        monthBoundaries.push({
            label: dateFns.format(curr, 'yyyy-M'),
            start: startOffset,
            end: endOffset,
            mid: startOffset + (endOffset - startOffset) / 2
        });
        curr = nextMonth;
    }

    const monthStripes = {
        id: 'monthStripes',
        beforeDraw: (chart) => {
            const { ctx, chartArea, scales: { x } } = chart;
            ctx.save();
            monthBoundaries.forEach((m, i) => {
                if (i % 2 === 0) {
                    const left = Math.max(chartArea.left, x.getPixelForValue(m.start));
                    const right = Math.min(chartArea.right, x.getPixelForValue(m.end));
                    if (left < chartArea.right && right > chartArea.left) {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                        ctx.fillRect(left, chartArea.top, right - left, chartArea.bottom - chartArea.top);
                    }
                }
            });
            ctx.restore();
        }
    };

    if (chart) chart.destroy();
    chart = new Chart(document.getElementById('msgChart'), {
        type: 'line',
        plugins: [monthStripes],
        data: { datasets: datasets },
        options: {
            responsive: true, 
            maintainAspectRatio: false,
            scales: {
                x: {
                    type: 'linear',
                    min: 0,
                    max: totalDays,
                    grid: { display: false },
                    ticks: {
                        autoSkip: false,
                        callback: function(value) {
                            const match = monthBoundaries.find(m => Math.round(m.mid) === value);
                            return match ? match.label : null;
                        },
                        stepSize: 1 
                    }
                },
                y: { 
                    type: isLog ? 'logarithmic' : 'linear',
                    beginAtZero: !isLog,
                    ticks: {
                        mirror: true, // Labels inside the chart
                        z: 10,        // Labels on top
                        padding: -5,
                        callback: function(value) {
                            return Number(value).toLocaleString();
                        }
                    },
                    title: { display: true, text: 'Avg Words per Day' } 
                }
            },
            plugins: {
                tooltip: {
                    callbacks: {
                        title: (items) => {
                            const d = dateFns.addDays(paddedFirstDate, items[0].parsed.x);
                            return dateFns.format(d, 'MMM do, yyyy');
                        }
                    }
                }
            }
        }
    });
}

    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'chat_stats.png';
        link.href = document.getElementById('msgChart').toDataURL('image/png');
        link.click();
    };

    document.getElementById('resetBtn').onclick = () => location.reload();
</script>
</body>
</html>
